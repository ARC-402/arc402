# Echidna configuration for ServiceAgreement property-based fuzzing
# Run: echidna . --contract ServiceAgreementInvariants --config test/echidna/echidna.config.yaml

testMode: "property"      # Run echidna_ prefix functions as boolean properties
testLimit: 50000          # Number of test sequences to run
seqLen: 100               # Maximum length of each call sequence

# Contract deployment address (Echidna's deterministic deployer)
contractAddr: "0x00a329c0648769A73afAc7F9381E08FB43dBEA72"
deployer: "0x30000"

# Fuzzing senders — Echidna will use these as msg.sender across sequences
sender:
  - "0x10000"   # Acts as client / random party
  - "0x20000"   # Acts as provider / random party
  - "0x30000"   # Acts as owner (same as deployer)

# Give senders ETH for propose() calls
balanceAddr: "0x10000"
balanceContract: "100000000000000000000"  # 100 ETH per sender

# Corpus directory for coverage-guided mutation (optional)
# corpusDir: "test/echidna/corpus"

# Print counterexample on failure
# filterFunctions: []  # Leave empty to fuzz ALL public functions

# Solidity version
solcArgs: "--solc-version 0.8.24"

# Optimization (match foundry.toml)
# solcOptimization: 200
