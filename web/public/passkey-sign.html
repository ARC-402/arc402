<!DOCTYPE html>
<html>
<head>
<title>ARC-402: Sign Governance Op</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:32px;max-width:480px;width:100%}
h1{font-size:1.4rem;font-weight:600;margin-bottom:8px}
.sub{color:#888;font-size:0.9rem;margin-bottom:24px}
.op-card{background:#1a1a1a;border-radius:10px;padding:16px;margin-bottom:24px}
.op-card .label{color:#888;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.op-card .value{font-family:monospace;font-size:0.85rem;word-break:break-all}
.op-card .op-name{font-size:1.1rem;font-weight:600;color:#3b82f6;margin-bottom:12px}
button{width:100%;padding:14px;background:#3b82f6;color:white;border:none;border-radius:10px;font-size:1rem;font-weight:500;cursor:pointer}
button:hover{background:#2563eb}
button:disabled{background:#333;color:#666;cursor:not-allowed}
#status{margin-top:20px;padding:14px;border-radius:10px;background:#1a1a1a;font-size:0.85rem;display:none}
.done{color:#22c55e}.err{color:#ef4444}.info{color:#888}
.warn{background:#1a1200;border:1px solid #3a2800;border-radius:10px;padding:12px;margin-bottom:20px;font-size:0.85rem;color:#f59e0b}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Sign Governance Op</h1>
  <p class="sub">ARC-402 daemon is requesting your approval. Verify the details below before signing.</p>

  <div class="warn">⚠️ Only approve if you initiated this action. Never sign unexpected requests.</div>

  <div class="op-card">
    <div class="op-name" id="opName">Loading...</div>
    <div class="label">Wallet</div>
    <div class="value" id="walletAddr">—</div>
    <div class="label" style="margin-top:12px">Challenge</div>
    <div class="value" id="challenge" style="font-size:0.7rem">—</div>
  </div>

  <button id="btn" onclick="sign()">Sign with Face ID / Fingerprint</button>
  <div id="status"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const op = params.get("op") || "Unknown operation";
const wallet = params.get("wallet") || "—";
const challengeHex = params.get("challenge") || "";
const credId = params.get("credId") || "";
const callbackUrl = params.get("callback") || "";

document.getElementById("opName").textContent = op;
document.getElementById("walletAddr").textContent = wallet;
document.getElementById("challenge").textContent = challengeHex;

function hexToBytes(hex) {
  hex = hex.replace(/^0x/, "");
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.substr(i*2, 2), 16);
  return arr;
}

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}

function parseDerSig(sig) {
  let off = 2;
  off++; // 0x02
  const rLen = sig[off++];
  const r = sig.slice(off, off + rLen); off += rLen;
  off++; // 0x02
  const sLen = sig[off++];
  const s = sig.slice(off, off + sLen);
  const pad = arr => { const p = new Uint8Array(32); p.set(arr.slice(-32), 32 - Math.min(arr.length, 32)); return p; };
  const rp = pad(r), sp = pad(s);
  const packed = new Uint8Array(64);
  packed.set(rp, 0); packed.set(sp, 32);
  return "0x" + Array.from(packed).map(v=>v.toString(16).padStart(2,"0")).join("");
}

async function sign() {
  const s = document.getElementById("status");
  const btn = document.getElementById("btn");
  s.style.display = "block";
  btn.disabled = true;

  try {
    s.innerHTML = '<span class="info">⏳ Waiting for Face ID / fingerprint...</span>';

    if (!credId) throw new Error("No credential ID provided. Run passkey setup first.");

    const credIdBytes = Uint8Array.from(atob(credId.replace(/-/g,"+").replace(/_/g,"/")), c => c.charCodeAt(0));
    const challenge = challengeHex ? hexToBytes(challengeHex) : crypto.getRandomValues(new Uint8Array(32));

    const assertion = await navigator.credentials.get({ publicKey: {
      challenge,
      allowCredentials: [{ id: credIdBytes, type: "public-key" }],
      userVerification: "required",
      timeout: 60000,
    }});

    const sig = parseDerSig(new Uint8Array(assertion.response.signature));

    s.innerHTML = `<span class="done">✅ Signed. Submitting to daemon...</span>`;

    if (callbackUrl) {
      const res = await fetch(callbackUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ signature: sig, credentialId: b64url(assertion.rawId) }),
      });
      if (res.ok) {
        s.innerHTML = `<span class="done">✅ Submitted. Transaction on its way.</span>`;
      } else {
        s.innerHTML += `<br><span class="err">⚠ Daemon returned ${res.status}. Check daemon logs.</span>`;
      }
    } else {
      s.innerHTML = `
        <div class="done">✅ Signed</div>
        <div style="margin-top:12px;font-family:monospace;font-size:0.75rem;word-break:break-all;color:#888">${sig}</div>
      `;
    }
  } catch(e) {
    s.innerHTML = `<span class="err">❌ ${e.message}</span>`;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
